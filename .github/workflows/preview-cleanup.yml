name: Cleanup Firebase Hosting Preview

on:
  pull_request:
    types: [closed]
    paths:
      - 'projects/web/**'
      - 'projects/shared/**'

permissions:
  contents: read
  id-token: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT_HOSTING }}
          project_id: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Delete preview channel
        run: |
          npx firebase hosting:channel:delete ${{ github.event.pull_request.head.ref }} \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --force || true
