name: CI

on:
  pull_request:
    paths:
      - 'projects/**'
      - '.github/workflows/ci.yml'
      - '.github/actions/setup/**'

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Lint
        run: npm run lint -w web

      - name: Typecheck
        run: npx tsc -b
        working-directory: projects/web

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Lint
        run: npm run lint -w functions

      - name: Typecheck
        run: npm run build -w functions
