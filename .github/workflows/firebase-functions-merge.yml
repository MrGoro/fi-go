name: Deploy to Firebase Functions
on:
  push:
    branches:
      - master
    paths:
      - 'projects/shared/**'
      - 'projects/functions/**'

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Shared
        run: npm run shared:build

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT_FUNCTIONS }}
          project_id: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Deploy to Firebase Functions
        run: npx firebase deploy --only functions --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} --token "${{ steps.auth.outputs.access_token }}"
        env:
          FIREBASE_TOKEN: ${{ steps.auth.outputs.access_token }}
