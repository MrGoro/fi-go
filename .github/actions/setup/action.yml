name: Setup
description: Setup Node.js, install dependencies, and build shared library

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build shared
      shell: bash
      run: npm run shared:build
